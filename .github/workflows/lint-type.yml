name: gpt5-lint-type

on:
  pull_request:
    paths:
      - 'submissions/gpt-5/**'
      - '.github/workflows/lint-type.yml'
  push:
    branches: ['**']
    paths:
      - 'submissions/gpt-5/**'
      - '.github/workflows/lint-type.yml'

jobs:
  lint_type:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@b4ffde65f46336ab3768b13da02a9b133c67b9e5
      - name: Set up Python
        uses: actions/setup-python@82c7e631bb3cdc910f68e0081d67478d79c6982d
        with:
          python-version: '3.11'
      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff==0.6.9 mypy==1.10.0
      - name: Ruff
        run: |
          ruff version
          ruff check submissions/gpt-5
      - name: Mypy
        run: |
          mypy --version
          mypy submissions/gpt-5
