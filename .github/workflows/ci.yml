name: gpt5-ci
on:
  pull_request:
    paths:
      - 'submissions/gpt-5/**'
      - '.github/workflows/ci.yml'
  push:
    branches: ['**']
    paths:
      - 'submissions/gpt-5/**'
      - '.github/workflows/ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: pytest -q submissions/gpt-5/tests
